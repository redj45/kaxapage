name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start the server with ...
        2. Send request to ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KaxaPage Version
      placeholder: e.g. v0.1.0 or commit SHA
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 24.04, macOS 14, Debian 12
    validations:
      required: true

  - type: input
    id: postgres
    attributes:
      label: PostgreSQL Version
      placeholder: e.g. 16.2
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser (if UI issue)
      placeholder: e.g. Chrome 124, Firefox 125
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs here. Set `RUST_LOG=debug` for verbose output.
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, config snippets, anything else that might help.
    validations:
      required: false
