name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install musl tools
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web/admin
          npm ci
          npm run build

      - name: Build release binary (musl)
        env:
          SQLX_OFFLINE: 'true'
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/kaxapage dist/kaxapage
          cp -r migrations dist/migrations
          tar -czf kaxapage-${{ github.ref_name }}-x86_64-linux-musl.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: kaxapage-${{ github.ref_name }}-x86_64-linux-musl.tar.gz

  build-macos:
    name: Build (macOS aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web/admin
          npm ci
          npm run build

      - name: Build release binary
        env:
          SQLX_OFFLINE: 'true'
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/kaxapage dist/kaxapage
          cp -r migrations dist/migrations
          tar -czf kaxapage-${{ github.ref_name }}-aarch64-macos.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: kaxapage-${{ github.ref_name }}-aarch64-macos.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: KaxaPage ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/linux-x86_64/*.tar.gz
            artifacts/macos-aarch64/*.tar.gz
